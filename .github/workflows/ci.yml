name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go mod download
        run: go mod download

      - name: Go build
        run: go build ./...

      - name: Go test
        run: go test ./...

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: .NET restore
        run: dotnet restore engine/

      - name: .NET build
        run: dotnet build engine/ -c Release --no-restore

      - name: .NET publish (linux-x64)
        run: dotnet publish engine/ -c Release -r linux-x64 --self-contained -o ./engine-out

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: npm install
        run: npm ci
        working-directory: web

      - name: npm run build
        run: npm run build
        working-directory: web

  integration:
    runs-on: ubuntu-latest
    needs: [go, dotnet]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build .NET engine (linux-x64)
        run: dotnet publish engine/ -c Release -r linux-x64 --self-contained -o ./bin/engine

      - name: Run integration tests (.NET protection + execution)
        run: go test -v ./internal/integration/ -count=1

  docker:
    runs-on: ubuntu-latest
    needs: [go, dotnet, frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t shieldbinary:ci .
