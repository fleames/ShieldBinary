openapi: 3.0.3
info:
  title: ShieldBinary API
  description: Binary protection service for .NET and native PE
  version: 1.0.0

servers:
  - url: /
    description: API root
  - url: /api/v1
    description: API v1

paths:
  /health:
    get:
      summary: Liveness check
      tags: [Health]
      responses:
        '200': { description: Server is running }

  /ready:
    get:
      summary: Readiness check (Redis connectivity)
      tags: [Health]
      responses:
        '200': { description: Ready to accept traffic }
        '503': { description: Unhealthy (e.g. Redis down) }

  /auth/register:
    post:
      summary: Register a new user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { description: Email already registered }

  /auth/login:
    post:
      summary: Login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        '401': { description: Invalid credentials }

  /auth/me:
    get:
      summary: Get current user
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
        '401': { description: Unauthorized }

  /upload:
    post:
      summary: Upload a binary file
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: .exe or .dll file (max 100MB)
      responses:
        '200':
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  input_key: { type: string }
                  filename: { type: string }
                  size: { type: integer }
        '400': { $ref: '#/components/responses/BadRequest' }

  /scan:
    post:
      summary: Scan an executable
      description: Scan .exe/.dll for PE type, architecture, and BinaryProtect protection markers. No storage; result returned immediately.
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: .exe or .dll file (max 100MB)
      responses:
        '200':
          description: Scan result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScanResult' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /jobs:
    get:
      summary: List jobs for current user
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items: { $ref: '#/components/schemas/Job' }
    post:
      summary: Create a protection job
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input_key, tier]
              properties:
                input_key: { type: string }
                tier: { type: string, enum: [minimal, basic, pro, enterprise] }
                binary_type: { type: string, default: auto }
      responses:
        '202':
          description: Job queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id: { type: string }
                  status: { type: string, example: queued }
                  message: { type: string }
    delete:
      summary: Delete all jobs (clear history)
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: All jobs deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  count: { type: integer }
        '401': { description: Unauthorized }

  /jobs/{id}:
    get:
      summary: Get job status
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
        '404': { description: Job not found }
    delete:
      summary: Delete a job
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Job deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '404': { description: Job not found }

  /jobs/{id}/download:
    get:
      summary: Download protected binary (one-time)
      description: Streams the protected file. After a successful download, the file is deleted from storage and cannot be downloaded again.
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: File or presigned URL
        '400': { description: Job not ready }
        '404': { description: Job not found }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string }

    ScanResult:
      type: object
      properties:
        path: { type: string }
        size: { type: integer }
        valid_pe: { type: boolean }
        is_dotnet: { type: boolean }
        machine: { type: string }
        protected: { type: boolean }
        protection_format: { type: string }
        protection_tier: { type: string }
        payload_size: { type: integer }
        embedding: { type: string }
        error: { type: string }

    Job:
      type: object
      properties:
        job_id: { type: string }
        status: { type: string }
        progress: { type: integer }
        tier: { type: string }
        binary_type: { type: string }
        input_key: { type: string }
        output_key: { type: string }
        error: { type: string }

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
